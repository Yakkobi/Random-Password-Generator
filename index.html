<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Random Password Generator</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div id="title">
      <h2>Random Password Generator</h2>
    </div>

    <div id="outputField">
      <div class="output">Your Generated Password Appears here</div>

      <div class="copyButton">
        <button>Copy Password</button>
      </div>

      <div class="generateButton">
        <button>Generate New Password</button>
      </div>
    </div>

    <div id="optionsContainer">
      <div class="optionsText">
        <div class="lengthOption">Length</div>
        <div class="textOption">Include Text</div>
        <div>Numbers</div>
        <div>Symbol Replace</div>
        <div>Scramble</div>
      </div>

      <div class="optionsInputs">
        <div class="lengthOption">~Slider~</div>
        <div class="textInputField">Input Field</div>
        <div>~Slider~</div>
        <div>Check Box</div>
        <div>Check Box</div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
